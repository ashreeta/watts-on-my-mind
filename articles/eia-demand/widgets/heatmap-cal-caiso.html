10.95,20.48,37.71,48.5,55.14,50.76,40.97,2.34,7.24,9.75,4.87,4.14,4.74,2.62,5.06,5.46,3.87,0.26,-1.54,-6.54,1.09,8.27,7.78,8.31,8.6,6.74,11.49,24.68,29.19,21.73,26.47,13.7,7.05,3.63,4.45,4.54,4.05,3.33,5.54,7.93,7.31,6.48,11.6,9.63,8.57,6.0,4.11,1.73,-0.32,-2.16,-3.53,-14.29,-4.3,10.57,17.62,29.94,22.77,9.61,-1.26,-0.61,0.4,2.14,3.97,4.87,6.67,5.96,8.28,7.92,10.01,7.49,1.49,0.99,-0.75,-3.43,-6.95,-15.41,-8.61,-16.17,-26.06,-19.75,-13.62,-10.2,-4.52,0.16,1.73,3.58,4.09,5.74,4.78,10.34,16.24,14.51,13.29,4.53,10.98,8.25,9.5,6.44,12.95,20.24,-9.2,-27.06,-31.58,-22.36,-17.68,-9.22,3.19,7.67,8.28,8.57,8.16,7.28,6.33,2.09,8.37,9.78,7.49,4.9,8.79,13.07,18.12,21.89,20.46,17.4,5.51,18.37,5.14,6.22]}];
const MTK    = [[0.0,"Jan"],[0.08493150684931507,"Feb"],[0.16164383561643836,"Mar"],[0.2465753424657534,"Apr"],[0.3287671232876712,"May"],[0.4136986301369863,"Jun"],[0.4958904109589041,"Jul"],[0.5808219178082191,"Aug"],[0.6657534246575343,"Sep"],[0.7479452054794521,"Oct"],[0.8328767123287671,"Nov"],[0.915068493150685,"Dec"]];  // [[frac, abbr], ...]
const DAYS   = 365, HRS = 24;

function rdbu(v) {
  // OrangeBu: negative → blue, zero → white, positive → orange
  const t = Math.max(0, Math.min(1, (v + CMAX) / (2 * CMAX)));
  let r,g,b;
  if (t < 0.5) {
    const s=t/0.5;
    // deep blue (20,70,185) → white
    r=Math.round(20 +(255-20) *s); g=Math.round(70 +(255-70) *s); b=Math.round(185+(255-185)*s);
  } else {
    const s=(t-0.5)/0.5;
    // white → amber orange (240,130,0)
    r=Math.round(255-(255-240)*s); g=Math.round(255-(255-130)*s); b=Math.round(255-(255-0)*s);
  }
  return [r,g,b];
}

// Render 24×365 raw canvas then scale to display canvas
function renderHeatmap(cv, flat) {
  const raw = document.createElement('canvas');
  raw.width=HRS; raw.height=DAYS;
  const rctx=raw.getContext('2d');
  const img=rctx.createImageData(HRS,DAYS);
  const d=img.data;
  for(let i=0;i<DAYS*HRS;i++){
    const v=flat[i];
    let r,g,b;
    if(v===null||v===undefined){r=g=b=238;}
    else {[r,g,b]=rdbu(v);}
    d[i*4]=r; d[i*4+1]=g; d[i*4+2]=b; d[i*4+3]=255;
  }
  rctx.putImageData(img,0,0);
  // Draw to display canvas at its current buffer size
  const ctx=cv.getContext('2d');
  ctx.imageSmoothingEnabled=false;
  ctx.drawImage(raw,0,0,HRS,DAYS,0,0,cv.width,cv.height);
}

function renderColorbar(cv) {
  const ctx=cv.getContext('2d');
  const h=cv.height;
  for(let i=0;i<h;i++){
    const v=CMAX-(2*CMAX)*i/h;
    const [r,g,b]=rdbu(v);
    ctx.fillStyle=`rgb(${r},${g},${b})`;
    ctx.fillRect(0,i,cv.width,1);
  }
}

function buildYAxis(el, panelH, topOffset=0) {
  el.style.height=(panelH+topOffset)+'px';
  el.style.position='relative';
  el.innerHTML='';
  MTK.forEach(([frac,lbl])=>{
    const s=document.createElement('span');
    s.textContent=lbl;
    s.style.cssText=`position:absolute;top:${topOffset+Math.round(frac*panelH)-5}px;
      right:3px;font-size:9px;color:#aaa;line-height:1;white-space:nowrap`;
    el.appendChild(s);
  });
}

function init() {
  const panelsEl=document.getElementById('panels');
  const yaxEl=document.getElementById('yax');

  // Build panel DOM
  panels.forEach(p=>{
    const div=document.createElement('div');
    div.className='panel';
    const hdr=document.createElement('div'); hdr.className='panel-hdr';
    hdr.innerHTML=`<span class="panel-title">${p.label}</span>
                   <span class="panel-sub">${p.entity}</span>`;
    const cv=document.createElement('canvas');
    cv.className='hm';
    const xax=document.createElement('div'); xax.className='xax';
    ['0h','6h','12h','18h','23h'].forEach(t=>{
      const s=document.createElement('span'); s.textContent=t; xax.appendChild(s);
    });
    div.appendChild(hdr); div.appendChild(cv); div.appendChild(xax);
    panelsEl.appendChild(div);
  });

  // Colorbar ticks
  const cbTicks=document.getElementById('cbTicks');
  [CMAX, Math.round(CMAX/2), 0, -Math.round(CMAX/2), -CMAX].forEach(v=>{
    const s=document.createElement('span');
    s.textContent=(v>0?'+':'')+v+'%';
    cbTicks.appendChild(s);
  });

  // Fixed canvas display height (compact but readable)
  const PANEL_H = 270;

  // Render function (called on first paint & resize)
  function render() {
    const cvs = panelsEl.querySelectorAll('canvas.hm');
    if(!cvs.length) return;
    const dispW = cvs[0].clientWidth;
    if(!dispW) return;
    // Set colorbar height to match panel height
    const cbCv=document.getElementById('cbCv');
    cbCv.height=PANEL_H;
    cbCv.style.height=PANEL_H+'px';
    document.getElementById('cbTicks').style.height=PANEL_H+'px';
    renderColorbar(cbCv);
    const hdrH = cvs.length ? Math.round(cvs[0].getBoundingClientRect().top - yaxEl.getBoundingClientRect().top) : 0;
    buildYAxis(yaxEl, PANEL_H, hdrH);
    cvs.forEach((cv,i)=>{
      cv.width=dispW;
      cv.height=PANEL_H;
      cv.style.height=PANEL_H+'px';
      renderHeatmap(cv, panels[i].data);
    });
  }

  // Initial render (deferred so layout is stable)
  requestAnimationFrame(()=>{ render(); });
  window.addEventListener('resize', render);
}

document.addEventListener('DOMContentLoaded', init);
</script>
