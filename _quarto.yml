project:
  type: website
  output-dir: _site
  render:
    - index.qmd
    - about.qmd
    - articles/**/*.qmd

website:
  title: "Watt's on My Mind"
  description: "Analysis and writing on energy systems, electrification, and the power grid."
  navbar:
    pinned: true
    left:
      - href: index.qmd
        text: Home
      - href: about.qmd
        text: About
  page-footer:
    left: "© 2026 Ashreeta Prasanna"
    right: "Built with [Quarto](https://quarto.org)"

author: "Ashreeta Prasanna"

format:
  html:
    theme: [flatly, custom.scss]
    toc: true
    toc-depth: 3
    toc-title: "Contents"
    smooth-scroll: true
    link-external-newwindow: true
    include-in-header:
      - text: |
          <link rel="preconnect" href="https://fonts.googleapis.com">
          <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
          <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
